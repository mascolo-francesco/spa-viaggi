services:
  mongo:
    image: mongo:8
    container_name: spa-viaggi-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro

  backend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.backend
    container_name: spa-viaggi-backend
    environment:
      - APP_NAME=SPA Viaggi API
      - APP_ENV=development
      - API_PREFIX=/api/v1
      - JWT_SECRET_KEY=change_me_super_secret
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=120
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB_NAME=spa_viaggi
      - MONGODB_MAX_POOL_SIZE=100
      - MONGODB_MIN_POOL_SIZE=5
      - MONGODB_WAIT_QUEUE_TIMEOUT_MS=5000
      - MONGODB_SERVER_SELECTION_TIMEOUT_MS=5000
      - MONGODB_RETRY_WRITES=true
      - MONGODB_RETRY_READS=true
      - EXPORTS_DIR=/app/data/exports
      - WORKER_POLL_SECONDS=2
    volumes:
      - ../data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  worker:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: spa-viaggi-worker
    environment:
      - APP_NAME=SPA Viaggi API
      - APP_ENV=development
      - API_PREFIX=/api/v1
      - JWT_SECRET_KEY=change_me_super_secret
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=120
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DB_NAME=spa_viaggi
      - MONGODB_MAX_POOL_SIZE=100
      - MONGODB_MIN_POOL_SIZE=5
      - MONGODB_WAIT_QUEUE_TIMEOUT_MS=5000
      - MONGODB_SERVER_SELECTION_TIMEOUT_MS=5000
      - MONGODB_RETRY_WRITES=true
      - MONGODB_RETRY_READS=true
      - EXPORTS_DIR=/app/data/exports
      - WORKER_POLL_SECONDS=2
    volumes:
      - ../data:/app/data
    depends_on:
      - mongo

volumes:
  mongo_data:
